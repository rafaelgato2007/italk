<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTalk</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; height: 100vh; display: flex; }
        
        .sidebar { width: 300px; background: #111b21; display: flex; flex-direction: column; border-right: 1px solid #2a3942; }
        .sidebar-header { padding: 20px; background: #202c33; font-weight: bold; font-size: 18px; }
        .add-friend-section { padding: 15px; border-bottom: 1px solid #2a3942; }
        .add-friend-section input { width: 100%; padding: 10px; border-radius: 20px; border: none; background: #2a3942; color: white; margin-bottom: 10px; }
        .add-friend-section input::placeholder { color: #8696a0; }
        .add-friend-section button { width: 100%; padding: 10px; border-radius: 20px; border: none; background: #00a884; color: white; cursor: pointer; font-weight: bold; }
        .section-title { padding: 15px 15px 5px 15px; font-size: 14px; color: #8696a0; font-weight: bold; }
        .requests-list, .friends-list { max-height: 200px; overflow-y: auto; }
        .request-item, .friend-item { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.2s; }
        .request-item:hover, .friend-item:hover { background: #2a3942; }
        .friend-item.active { background: #2a3942; }
        .friend-name { font-weight: 500; }
        .friend-email { font-size: 12px; color: #8696a0; }
        .accept-btn { background: #00a884; border: none; color: white; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { background: #202c33; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2a3942; }
        .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; }
        .chat-header-name { font-weight: bold; font-size: 16px; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 65%; padding: 8px 12px; border-radius: 8px; word-wrap: break-word; position: relative; }
        .message.sent { background: #00a884; align-self: flex-end; }
        .message.received { background: #202c33; align-self: flex-start; }
        .message-time { font-size: 10px; color: #8696a0; margin-top: 4px; text-align: right; }
        
        .message a {
            color: #ffffff;
            text-decoration: underline;
            word-break: break-all;
        }
        .message a:hover {
            color: #d4d4d4;
        }
        .message-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .message-image:hover {
            transform: scale(1.02);
        }
        .message-content {
            line-height: 1.4;
        }
       
        .input-area { padding: 15px 20px; background: #202c33; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #2a3942; color: white; outline: none; }
        .input-area button { padding: 12px 25px; border-radius: 25px; border: none; background: #00a884; color: white; cursor: pointer; font-weight: bold; }
        
        .user-profile { padding: 20px; background: #202c33; display: flex; align-items: center; gap: 15px; margin-top: auto; position: relative; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; background: #2a3942; background-size: cover; background-position: center; border: 2px solid #2a3942; cursor: pointer; }
        .user-avatar:hover { border: 2px solid #00a884; }
        .user-info { flex: 1; cursor: pointer; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-email { font-size: 12px; color: #8696a0; }
        .empty-state { text-align: center; color: #8696a0; padding: 40px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #202c33; padding: 25px; border-radius: 15px; min-width: 350px; text-align: center; }
        .modal-content button { padding: 10px 20px; margin: 5px; border-radius: 8px; border: none; cursor: pointer; }
        
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; margin: 20px 0; justify-items: center; }
        .avatar-grid img { width: 70px; height: 70px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .avatar-grid img:hover { border: 2px solid #00a884; }
        
        #userMenu {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: #202c33;
            padding: 10px;
            border-radius: 8px;
            min-width: 160px;
            z-index: 100;
        }
        #userMenu div {
            padding: 8px;
            cursor: pointer;
        }
        #userMenu div:hover {
            background: #2a3942;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2a3942;
            gap: 10px;
        }
        .detail-label {
            font-weight: bold;
            color: #8696a0;
            min-width: 100px;
            text-align: left;
        }
        .detail-value {
            color: white;
            flex: 1;
            text-align: left;
        }
        .detail-input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: none;
            background: #2a3942;
            color: white;
            font-size: 14px;
        }
        .detail-input:focus {
            outline: 1px solid #00a884;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .button-group button {
            flex: 1;
        }
        .btn-primary {
            background: #00a884;
        }
        .btn-secondary {
            background: #2a3942;
        }
        .btn-danger {
            background: #d6293e;
        }
        
        .password-confirm {
            margin-top: 10px;
            border-top: 1px solid #2a3942;
            padding-top: 10px;
        }
        .password-confirm input {
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: #2a3942;
            color: white;
            margin-top: 5px;
        }
        .error-message {
            color: #d6293e;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
        }
        .image-viewer img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">iTalk</div>
    <div class="add-friend-section">
        <input type="text" id="friendUsername" placeholder="Adicionar amigo (ex: joao_1)">
        <button onclick="sendFriendRequest()">Adicionar Amigo</button>
    </div>
    <div class="section-title">PEDIDOS RECEBIDOS</div>
    <div class="requests-list" id="requestsList"><div class="empty-state">Nenhum pedido</div></div>
    <div class="section-title">AMIGOS</div>
    <div class="friends-list" id="friendsList"><div class="empty-state">Nenhum amigo</div></div>
    
    <div class="user-profile">
        <div class="user-avatar" id="userAvatar" onclick="openAvatarModal()"></div>
        <div class="user-info" onclick="toggleMenu()">
            <div class="user-name" id="userName">Carregando...</div>
            <div class="user-email" id="userEmail">carregando@email.com</div>
        </div>
        <div id="userMenu">
            <div onclick="showDetails()">Detalhes da conta</div>
            <div style="color:#d6293e;" onclick="deleteAccount()">Eliminar conta</div>
        </div>
    </div>
</div>

<div class="chat-area">
    <div class="chat-header" id="chatHeader" style="display: none;">
        <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
        <div class="chat-header-name" id="chatName"></div>
    </div>
    <div class="messages-container" id="messagesContainer">
        <div class="empty-state">Selecione um amigo para começar a conversar</div>
    </div>
    <div class="input-area" id="inputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="Digite uma mensagem... " onkeypress="if(event.key==='Enter') sendMessage()" onpaste="handlePaste(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<div id="avatarModal" class="modal">
    <div class="modal-content">
        <h3>Escolhe o teu avatar</h3>
        <div class="avatar-grid">
            <img src="avatarsfemale_blonde.png.png" onclick="selectAvatar(this.src)">
            <img src="avatarsfemale_black.png.png" onclick="selectAvatar(this.src)">
            <img src="avatarsfemale_flame.png.png" onclick="selectAvatar(this.src)">
            <img src="avatarsmale_black.png" onclick="selectAvatar(this.src)">
            <img src="avatarsmale_blonde0.png" onclick="selectAvatar(this.src)">
            <img src="avataresmale_black1.png" onclick="selectAvatar(this.src)">
            <img src="avatarsmale_niblack.png" onclick="selectAvatar(this.src)">
        </div>
        <button onclick="closeAvatarModal()" style="background:#00a884;">Fechar</button>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <h3>Detalhes da conta</h3>
        <div class="detail-row">
            <span class="detail-label">ID:</span>
            <span class="detail-value" id="detailId">-</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Email:</span>
            <span class="detail-value" id="detailEmail">-</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Username:</span>
            <input type="text" id="editUsername" class="detail-input" value="">
        </div>
        <div class="detail-row">
            <span class="detail-label">Nova Password:</span>
            <input type="password" id="editPassword" class="detail-input" placeholder="Deixar vazio para não alterar">
        </div>
        <div class="password-confirm">
            <span class="detail-label">Password atual:</span>
            <input type="password" id="currentPassword" class="detail-input" placeholder="Digite sua senha atual para confirmar" required>
            <div id="passwordError" class="error-message">Senha atual incorreta!</div>
        </div>
        <div class="button-group">
            <button onclick="updateUsername()" class="btn-primary">Guardar Alterações</button>
            <button onclick="closeDetailsModal()" class="btn-secondary">Fechar</button>
        </div>
    </div>
</div>

<div id="imageViewer" class="image-viewer" onclick="closeImageViewer()">
    <img id="viewerImage" src="">
</div>

<script>
const API_BASE_URL = "http://localhost:8080";
let currentUser = null;
let currentFriend = null;
let refreshInterval = null;

function handlePaste(event) {
    const items = (event.clipboardData || event.originalEvent.clipboardData).items;
    
    for (let i = 0; i < items.length; i++) {
        const item = items[i];
        
        if (item.type.indexOf('image') !== -1) {
            event.preventDefault();
            const blob = item.getAsFile();
            processImage(blob);
            return;
        }
        
        if (item.type === 'text/plain') {
            item.getAsString(async (text) => {
                const urlPattern = /(https?:\/\/[^\s]+\.(?:jpg|jpeg|png|gif|webp|bmp))/gi;
                const urls = text.match(urlPattern);
                if (urls && urls.length > 0) {
                    event.preventDefault();
                    for (const url of urls) {
                        await processImageFromUrl(url);
                    }
                }
            });
        }
    }
}

async function processImage(blob) {
    if (!currentFriend) {
        alert("Selecione um amigo para conversar primeiro!");
        return;
    }
    
    const reader = new FileReader();
    reader.onloadend = async function() {
        const base64Image = reader.result;
        await sendImageMessage(base64Image);
    };
    reader.readAsDataURL(blob);
}

async function processImageFromUrl(url) {
    if (!currentFriend) {
        alert("Selecione um amigo para conversar primeiro!");
        return;
    }
    
    try {
        const response = await fetch(url);
        const blob = await response.blob();
        
        if (blob.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onloadend = async function() {
                await sendImageMessage(reader.result);
            };
            reader.readAsDataURL(blob);
        } else {
            await sendMessageWithContent(url);
        }
    } catch (err) {
        await sendMessageWithContent(url);
    }
}

async function sendImageMessage(base64Image) {
    try {
        const messageData = {
            sender: currentUser.email,
            receiver: currentFriend.email,
            message: base64Image
        };
        
        const response = await fetch(`${API_BASE_URL}/users/messages/send`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(messageData)
        });
        
        if (response.ok) {
            await loadMessages();
        } else {
            console.error("Erro ao enviar imagem");
        }
    } catch (err) {
        console.error("Erro ao enviar imagem:", err);
    }
}

async function sendMessageWithContent(message) {
    try {
        await fetch(`${API_BASE_URL}/users/messages/send`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                sender: currentUser.email, 
                receiver: currentFriend.email, 
                message: message
            })
        });
        await loadMessages();
    } catch (err) {
        console.error(err);
    }
}

function formatMessage(text) {
    if (!text) return '';
    
    if (text.startsWith('data:image/')) {
        return `<img src="${text}" class="message-image" onclick="viewImage('${text}')" alt="Imagem">`;
    }
    
    let formatted = escapeHtml(text);
    
    const urlPattern = /(https?:\/\/[^\s]+)/g;
    formatted = formatted.replace(urlPattern, function(url) {
        if (url.match(/\.(jpg|jpeg|png|gif|webp|bmp)(\?.*)?$/i)) {
            return `<img src="${url}" class="message-image" onclick="viewImage('${url}')" alt="Imagem" onerror="this.style.display='none'">`;
        }
        return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
    
    return formatted;
}

function viewImage(src) {
    const viewer = document.getElementById('imageViewer');
    const viewerImg = document.getElementById('viewerImage');
    viewerImg.src = src;
    viewer.style.display = 'flex';
}

function closeImageViewer() {
    document.getElementById('imageViewer').style.display = 'none';
}

document.addEventListener("DOMContentLoaded", async function () {
    const saved = localStorage.getItem("user");
    if (!saved) {
        window.location.href = "login.html";
        return;
    }

    currentUser = JSON.parse(saved);
    document.getElementById("userName").textContent = currentUser.username;
    document.getElementById("userEmail").textContent = currentUser.email;
    
    const avatarDiv = document.getElementById("userAvatar");
    if (currentUser.avatar) {
        avatarDiv.style.backgroundImage = `url(${currentUser.avatar})`;
        avatarDiv.style.backgroundSize = "cover";
        avatarDiv.style.backgroundPosition = "center";
    }

    await loadRequests();
    await loadFriends();

    refreshInterval = setInterval(async () => {
        if (currentUser) {
            await loadRequests();
            await loadFriends();
            if (currentFriend) await loadMessages();
        }
    }, 5000);
});

function toggleMenu() {
    const menu = document.getElementById("userMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", function (e) {
    const menu = document.getElementById("userMenu");
    const userInfo = document.querySelector(".user-info");
    const avatar = document.getElementById("userAvatar");
    if (menu && !menu.contains(e.target) && e.target !== userInfo && e.target !== avatar && !userInfo.contains(e.target)) {
        menu.style.display = "none";
    }
});

function showDetails() {
    if (!currentUser) return;
    
    document.getElementById("detailId").textContent = currentUser.id || "ID não disponível";
    document.getElementById("detailEmail").textContent = currentUser.email || "N/A";
    document.getElementById("editUsername").value = currentUser.username || "";
    document.getElementById("editPassword").value = "";
    document.getElementById("currentPassword").value = "";
    document.getElementById("passwordError").style.display = "none";
    
    document.getElementById("detailsModal").style.display = "flex";
    toggleMenu();
}

function closeDetailsModal() {
    document.getElementById("detailsModal").style.display = "none";
    document.getElementById("currentPassword").value = "";
    document.getElementById("passwordError").style.display = "none";
}

async function updateUsername() {
    const currentPassword = document.getElementById("currentPassword").value.trim();
    const newUsername = document.getElementById("editUsername").value.trim();
    const newPassword = document.getElementById("editPassword").value.trim();
    
    if (!currentPassword) {
        document.getElementById("passwordError").textContent = "Por favor, digite sua senha atual!";
        document.getElementById("passwordError").style.display = "block";
        return;
    }
    
    if ((!newUsername || newUsername === currentUser.username) && !newPassword) {
        alert("Nenhuma alteração detectada. Por favor, altere o username ou a senha.");
        return;
    }
    
    const saveButton = event.target;
    const originalText = saveButton.textContent;
    saveButton.textContent = "Verificando...";
    saveButton.disabled = true;
    
    try {
        const payload = { 
            email: currentUser.email, 
            currentPassword: currentPassword
        };
        if (newUsername && newUsername !== currentUser.username) payload.username = newUsername;
        if (newPassword) payload.newPassword = newPassword;
        
        const response = await fetch(`${API_BASE_URL}/users/update-secure`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
            if (data.username) currentUser.username = data.username;
            if (data.email) currentUser.email = data.email;
            if (data.id) currentUser.id = data.id;
            localStorage.setItem("user", JSON.stringify(currentUser));
            
            document.getElementById("userName").textContent = currentUser.username;
            document.getElementById("userEmail").textContent = currentUser.email;
            
            alert("Alterações salvas com sucesso!");
            closeDetailsModal();
            await loadFriends();
        } else {
            if (response.status === 401) {
                document.getElementById("passwordError").textContent = data.message || "Senha atual incorreta!";
                document.getElementById("passwordError").style.display = "block";
            } else {
                alert("Erro: " + (data.message || "Não foi possível alterar"));
            }
        }
    } catch (err) {
        console.error("Erro detalhado:", err);
        alert("Erro de conexão: " + err.message);
    } finally {
        saveButton.textContent = originalText;
        saveButton.disabled = false;
    }
}

async function deleteAccount() {
    if (!confirm("Tem certeza que deseja ELIMINAR sua conta permanentemente?")) return;
    if (!currentUser) return;

    const password = prompt("Digite sua senha para confirmar a exclusão da conta:");
    if (!password) {
        alert("Exclusão cancelada.");
        return;
    }
    
    try {
        const response = await fetch(`${API_BASE_URL}/users/delete-secure`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: currentUser.email, password: password })
        });
        
        if (response.status === 200) {
            const result = await response.text();
            alert(result);
            localStorage.removeItem("user");
            window.location.href = "login.html";
        } else {
            const error = await response.text();
            alert("Erro ao eliminar conta: " + error);
        }
    } catch (err) {
        console.error("Erro detalhado:", err);
        alert("Erro de conexão: " + err.message);
    }
}

function openAvatarModal() {
    document.getElementById("avatarModal").style.display = "flex";
}

function closeAvatarModal() {
    document.getElementById("avatarModal").style.display = "none";
}

function selectAvatar(src) {
    const avatarDiv = document.getElementById("userAvatar");
    avatarDiv.style.backgroundImage = `url(${src})`;
    avatarDiv.style.backgroundSize = "cover";
    avatarDiv.style.backgroundPosition = "center";

    if (currentUser) {
        currentUser.avatar = src;
        localStorage.setItem("user", JSON.stringify(currentUser));

        fetch(`${API_BASE_URL}/users/avatar`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: currentUser.email, avatar: src })
        }).catch(err => console.error("Erro ao salvar avatar:", err));
    }
    closeAvatarModal();
}

async function sendFriendRequest() {
    const usernameId = document.getElementById("friendUsername").value.trim();
    if (!usernameId) {
        alert("Digite o username_id (ex: joao_1)");
        return;
    }
    try {
        const res = await fetch(`${API_BASE_URL}/users/friends/request`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sender: currentUser.email, receiver: usernameId })
        });
        const msg = await res.text();
        alert(msg);
        document.getElementById("friendUsername").value = "";
    } catch (err) {
        alert("Erro: " + err.message);
    }
}

async function loadRequests() {
    try {
        const res = await fetch(`${API_BASE_URL}/users/friends/requests?email=${currentUser.email}`);
        const data = await res.json();
        const container = document.getElementById("requestsList");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state">Nenhum pedido</div>';
            return;
        }
        container.innerHTML = "";
        for (const req of data) {
            const div = document.createElement("div");
            div.className = "request-item";
            div.innerHTML = `
                <div><div class="friend-name">${req.username || req.sender_email}</div></div>
                <button class="accept-btn" onclick="acceptRequest('${req.sender_email}')">Aceitar</button>
            `;
            container.appendChild(div);
        }
    } catch (err) { console.error(err); }
}

async function acceptRequest(senderEmail) {
    try {
        await fetch(`${API_BASE_URL}/users/friends/accept`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sender: senderEmail, receiver: currentUser.email })
        });
        alert("Amigo adicionado!");
        await loadRequests();
        await loadFriends();
    } catch (err) { console.error(err); }
}

async function loadFriends() {
    try {
        const res = await fetch(`${API_BASE_URL}/users/friends?email=${currentUser.email}`);
        const data = await res.json();
        const container = document.getElementById("friendsList");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state">Nenhum amigo</div>';
            return;
        }
        container.innerHTML = "";
        for (const friend of data) {
            const div = document.createElement("div");
            div.className = `friend-item ${currentFriend && currentFriend.email === friend.email ? "active" : ""}`;
            div.innerHTML = `
                <div>
                    <div class="friend-name">${friend.username}</div>
                    <div class="friend-email">${friend.email}</div>
                </div>
            `;
            div.onclick = () => openChat(friend);
            container.appendChild(div);
        }
    } catch (err) { console.error(err); }
}

async function openChat(friend) {
    currentFriend = friend;
    document.getElementById("chatHeader").style.display = "flex";
    document.getElementById("inputArea").style.display = "flex";
    document.getElementById("chatName").textContent = friend.username;
    
    if (friend.avatar) {
        document.getElementById("chatHeaderAvatar").style.backgroundImage = `url(${friend.avatar})`;
        document.getElementById("chatHeaderAvatar").style.backgroundSize = "cover";
        document.getElementById("chatHeaderAvatar").style.backgroundPosition = "center";
    } else {
        document.getElementById("chatHeaderAvatar").style.backgroundImage = "none";
        document.getElementById("chatHeaderAvatar").style.background = "#2a3942";
    }
    
    await loadMessages();
    await markMessagesAsRead();
}

async function loadMessages() {
    if (!currentFriend) return;
    try {
        const res = await fetch(`${API_BASE_URL}/users/messages?userEmail=${currentUser.email}&friendEmail=${currentFriend.email}`);
        const messages = await res.json();
        const container = document.getElementById("messagesContainer");
        container.innerHTML = "";
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="empty-state">Nenhuma mensagem ainda. Envie uma!</div>';
            return;
        }
        for (const msg of messages) {
            const isSent = msg.sender_email === currentUser.email;
            const div = document.createElement("div");
            div.className = `message ${isSent ? "sent" : "received"}`;
            
            const formattedContent = formatMessage(msg.message);
            
            div.innerHTML = `
                <div class="message-content">${formattedContent}</div>
                <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
            `;
            container.appendChild(div);
        }
        container.scrollTop = container.scrollHeight;
    } catch (err) { console.error(err); }
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    if (!message || !currentFriend) return;
    await sendMessageWithContent(message);
    input.value = "";
}

async function markMessagesAsRead() {
    if (!currentFriend) return;
    try {
        await fetch(`${API_BASE_URL}/users/messages/read`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                userEmail: currentUser.email, 
                friendEmail: currentFriend.email 
            })
        });
    } catch (err) {
        console.error("Erro ao marcar mensagens como lidas:", err);
    }
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}
</script>

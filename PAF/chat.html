<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>italk</title>

  <style>
    body {
      margin: 0;
      background: #0b141a;
      color: white;
      font-family: Arial;
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 250px;
      background: #111b21;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .topbar {
      background: #202c33;
      padding: 12px;
    }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #202c33;
    }

    .input-area input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 5px;
    }

    .input-area button {
      padding: 10px;
      margin-left: 10px;
      background: #00a884;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .user-bar {
      background: #202c33;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
    }

  .avatar {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: #ccc;
  cursor: pointer;

  background-size: contain; /* 👈 muda de cover para contain */
  background-position: center;
  background-repeat: no-repeat;

  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;

  border: 2px solid #2a3942;


}
    #userMenu {
  display: none;
  position: absolute;
  bottom: 102px;
  left: 20px;    
  background: #202c33;
  padding: 10px;
  border-radius: 8px;
  min-width: 160px;
}
    

    #userMenu div {
      padding: 8px;
      cursor: pointer;
    }

    #userMenu div:hover {
      background: #2a3942;
    }
    #profileName {
  font-size: 18px;
  font-weight: 600;
    margin-left: 25px;

  
}

    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #202c33;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    .avatar-grid {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 10px;
      margin: 20px 0;
    }

    .avatar-grid img {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .avatar-grid img:hover {
      border: 2px solid #00a884;
    }

  </style>
</head>

<body>

  <div class="sidebar">

    <div class="topbar">
      Chat
    </div>

    <div class="user-bar">
      <div class="avatar" onclick="openAvatarModal()"></div>

      <div id="profileName" style="cursor:pointer;" onclick="toggleMenu()">
        Utilizador
      </div>

      <div id="userMenu">
        <div onclick="showDetails()">Detalhes da conta</div>
        <div style="color:red;" onclick="deleteAccount()">Eliminar conta</div>
      </div>
    </div>

  </div>

  <div class="chat">
    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
      <input id="messageInput" placeholder="Mensagem">
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>

 
  <div id="avatarModal" class="modal">
    <div class="modal-content">
      <h3>Escolhe o teu avatar</h3>

      <div class="avatar-grid">
        <img src="avatarsfemale_blonde.png.png" onclick="selectAvatar(this.src)">
        <img src="avatarsfemale_black.png.png" onclick="selectAvatar(this.src)">
        <img src="avatarsfemale_flame.png.png" onclick="selectAvatar(this.src)">
        <img src="avatarsmale_black.png" onclick="selectAvatar(this.src)">
        <img src="avatarsmale_blonde0.png" onclick="selectAvatar(this.src)">
           <img src="avataresmale_black1.png" onclick="selectAvatar(this.src)">
              <img src="avatarsmale_niblack.png" onclick="selectAvatar(this.src)">

      </div>

      <button onclick="closeAvatarModal()">Fechar</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const raw = localStorage.getItem("user");
      if (!raw) return;

      const user = JSON.parse(raw);

      
      const name = user.nome || user.name || user.username || user.email;
      if (name) {
        document.getElementById("profileName").textContent = name;
      }

      
      const avatarDiv = document.querySelector(".avatar");
      if (user.avatar) {
        avatarDiv.style.backgroundImage = `url(${user.avatar})`;
        avatarDiv.style.backgroundSize = "cover";
        avatarDiv.style.backgroundPosition = "center";
      }
    });

    function toggleMenu() {
      const menu = document.getElementById("userMenu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    document.addEventListener("click", function (e) {
      const menu = document.getElementById("userMenu");
      const profile = document.getElementById("profileName");

      if (!menu.contains(e.target) && e.target !== profile) {
        menu.style.display = "none";
      }
    });

    function showDetails() {
      const raw = localStorage.getItem("user");
      if (!raw) return alert("Nenhum utilizador");

      const user = JSON.parse(raw);

      alert(`Nome: ${user.nome || "N/A"}\nEmail: ${user.email || "N/A"}`);
    }

    function sendMessage() {
      const input = document.getElementById("messageInput");
      const text = input.value.trim();
      if (!text) return;

      const box = document.getElementById("chatBox");

      const msg = document.createElement("div");
      msg.textContent = text;
      msg.style.padding = "10px";
      msg.style.background = "#00c26f";
      msg.style.margin = "5px";
      msg.style.borderRadius = "10px";
      msg.style.maxWidth = "60%";

      box.appendChild(msg);

      input.value = "";
      box.scrollTop = box.scrollHeight;
    }

    function deleteAccount() {
      if (!confirm("Eliminar conta?")) return;

      const raw = localStorage.getItem("user");
      if (!raw) return;

      const user = JSON.parse(raw);
      const email = user.email;

      fetch(`http://localhost:8080/users/${encodeURIComponent(email)}`, {
        method: "DELETE"
      })
      .then(res => {
        if (res.status === 200) {
          alert("Conta eliminada!");
          localStorage.removeItem("user");
          window.location.href = "login.html";
        } else {
          alert("Erro ao eliminar");
        }
      });
    }

   
    function openAvatarModal() {
      document.getElementById("avatarModal").style.display = "flex";
    }

    function closeAvatarModal() {
      document.getElementById("avatarModal").style.display = "none";
    }

    function selectAvatar(src) {
      const avatarDiv = document.querySelector(".avatar");

      avatarDiv.style.backgroundImage = `url(${src})`;
      avatarDiv.style.backgroundSize = "cover";
      avatarDiv.style.backgroundPosition = "center";

      const raw = localStorage.getItem("user");
      if (raw) {
        const user = JSON.parse(raw);
        user.avatar = src;
        localStorage.setItem("user", JSON.stringify(user));

        fetch("http://localhost:8080/users/avatar", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: user.email,
            avatar: src
          })
        });
      }

      closeAvatarModal();
    }
  </script>

</body>
</html>

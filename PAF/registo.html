  <!DOCTYPE html>
  <html lang="pt">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo</title>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

      body {
        background: #111b21;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: #202c33;
        padding: 40px;
        border-radius: 10px;
        width: 320px;
        text-align: center;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }

      h2 { color: #e9edef; margin-bottom: 20px; }

      .input-group { margin-bottom: 15px; text-align: left; }

      .input-group label { color: #8696a0; font-size: 14px; }

      .input-group input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: none;
        border-radius: 5px;
        background: #2a3942;
        color: white;
      }

      .input-group input:focus { outline: 2px solid #00a884; }

      .btn {
        width: 100%;
        padding: 12px;
        background: #00a884;
        border: none;
        border-radius: 25px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
      }

      .btn:hover { background: #008f72; }

      .footer {
        margin-top: 15px;
        font-size: 12px;
        color: #8696a0;
      }

      .footer a {
        color: #00a884;
        text-decoration: none;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <h2>Criar Conta</h2>

      <div class="input-group">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="O teu nome">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="exemplo@email.com">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="********">
      </div>

    

      <button class="btn" id="btnRegistar">Registar</button>

      <div class="footer">
        Já tens conta? <a href="login.html">Fazer login</a>
      </div>
    </div>

    <script>
      document.getElementById("btnRegistar").addEventListener("click", function() {

        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        if (!nome || !email || !password) {
          alert("Preenche todos os campos!");
          return;
        }

      

      fetch("http://localhost:8080/users/register", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: nome,
      email: email,
      password: password
    })
        })
        .then(response => response.json())
        .then(data => {
          console.log(data);
          alert("Registo feito com sucesso!");
        })
        .catch(error => { 
          console.error(error);
          alert("Erro ao registar");
        });

      });
    </script>

  </body>
  </html>

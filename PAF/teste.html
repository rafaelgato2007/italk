<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTalk - Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b141a; color: white; height: 100vh; display: flex; }
        
        .sidebar { width: 300px; background: #111b21; display: flex; flex-direction: column; border-right: 1px solid #2a3942; }
        .sidebar-header { padding: 20px; background: #202c33; font-weight: bold; font-size: 18px; }
        .add-friend-section { padding: 15px; border-bottom: 1px solid #2a3942; }
        .add-friend-section input { width: 100%; padding: 10px; border-radius: 20px; border: none; background: #2a3942; color: white; margin-bottom: 10px; }
        .add-friend-section input::placeholder { color: #8696a0; }
        .add-friend-section button { width: 100%; padding: 10px; border-radius: 20px; border: none; background: #00a884; color: white; cursor: pointer; font-weight: bold; }
        .section-title { padding: 15px 15px 5px 15px; font-size: 14px; color: #8696a0; font-weight: bold; }
        .requests-list, .friends-list { max-height: 200px; overflow-y: auto; }
        .request-item, .friend-item { padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.2s; }
        .request-item:hover, .friend-item:hover { background: #2a3942; }
        .friend-item.active { background: #2a3942; }
        .friend-name { font-weight: 500; }
        .friend-email { font-size: 12px; color: #8696a0; }
        .accept-btn { background: #00a884; border: none; color: white; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 12px; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { background: #202c33; padding: 15px 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #2a3942; }
        .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; }
        .chat-header-name { font-weight: bold; font-size: 16px; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 65%; padding: 8px 12px; border-radius: 8px; word-wrap: break-word; }
        .message.sent { background: #00a884; align-self: flex-end; }
        .message.received { background: #202c33; align-self: flex-start; }
        .message-time { font-size: 10px; color: #8696a0; margin-top: 4px; text-align: right; }
        .input-area { padding: 15px 20px; background: #202c33; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #2a3942; color: white; outline: none; }
        .input-area button { padding: 12px 25px; border-radius: 25px; border: none; background: #00a884; color: white; cursor: pointer; font-weight: bold; }
        
        .user-profile { padding: 20px; background: #202c33; display: flex; align-items: center; gap: 15px; margin-top: auto; position: relative; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; background: #2a3942; background-size: cover; background-position: center; border: 2px solid #2a3942; cursor: pointer; }
        .user-avatar:hover { border: 2px solid #00a884; }
        .user-info { flex: 1; cursor: pointer; }
        .user-name { font-weight: bold; font-size: 16px; }
        .user-email { font-size: 12px; color: #8696a0; }
        .empty-state { text-align: center; color: #8696a0; padding: 40px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #202c33; padding: 25px; border-radius: 15px; min-width: 300px; text-align: center; }
        .modal-content button { padding: 10px 20px; margin: 5px; border-radius: 8px; border: none; cursor: pointer; }
        
        .avatar-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 10px; margin: 20px 0; justify-items: center; }
        .avatar-grid img { width: 70px; height: 70px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .avatar-grid img:hover { border: 2px solid #00a884; }
        
        #userMenu {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: #202c33;
            padding: 10px;
            border-radius: 8px;
            min-width: 160px;
            z-index: 100;
        }
        #userMenu div {
            padding: 8px;
            cursor: pointer;
        }
        #userMenu div:hover {
            background: #2a3942;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">iTalk</div>
    <div class="add-friend-section">
        <input type="text" id="friendUsername" placeholder="Adicionar amigo (ex: joao_1)">
        <button onclick="sendFriendRequest()">Adicionar Amigo</button>
    </div>
    <div class="section-title">PEDIDOS RECEBIDOS</div>
    <div class="requests-list" id="requestsList"><div class="empty-state">Nenhum pedido</div></div>
    <div class="section-title">AMIGOS</div>
    <div class="friends-list" id="friendsList"><div class="empty-state">Nenhum amigo</div></div>
    
    <div class="user-profile">
        <div class="user-avatar" id="userAvatar" onclick="openAvatarModal()"></div>
        <div class="user-info" onclick="toggleMenu()">
            <div class="user-name" id="userName">Carregando...</div>
            <div class="user-email" id="userEmail">carregando@email.com</div>
        </div>
        <div id="userMenu">
            <div onclick="showDetails()">Detalhes da conta</div>
            <div style="color:red;" onclick="deleteAccount()">Eliminar conta</div>
        </div>
    </div>
</div>

<div class="chat-area">
    <div class="chat-header" id="chatHeader" style="display: none;">
        <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
        <div class="chat-header-name" id="chatName"></div>
    </div>
    <div class="messages-container" id="messagesContainer">
        <div class="empty-state">Selecione um amigo para começar a conversar</div>
    </div>
    <div class="input-area" id="inputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="Digite uma mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<!-- Modal Avatar -->
<div id="avatarModal" class="modal">
    <div class="modal-content">
        <h3>Escolhe o teu avatar</h3>
        <div class="avatar-grid">
            <img src="avatarsfemale_blonde.png.png" onclick="selectAvatar(this.src)">
            <img src="avatarsfemale_black.png.png" onclick="selectAvatar(this.src)">
            <img src="avatarsfemale_flame.png.png" onclick="selectAvatar(this.src)">
            <img src="avatarsmale_black.png" onclick="selectAvatar(this.src)">
            <img src="avatarsmale_blonde0.png" onclick="selectAvatar(this.src)">
            <img src="avataresmale_black1.png" onclick="selectAvatar(this.src)">
            <img src="avatarsmale_niblack.png" onclick="selectAvatar(this.src)">
        </div>
        <button onclick="closeAvatarModal()" style="background:#00a884;">Fechar</button>
    </div>
</div>

<!-- Modal Detalhes -->
<div id="detailsModal" class="modal">
    <div class="modal-content">
        <h3>Detalhes da conta</h3>
        <p><strong>ID:</strong> <span id="detailId"></span></p>
        <p><strong>Nome:</strong> <span id="detailUsername"></span></p>
        <p><strong>Email:</strong> <span id="detailEmail"></span></p>
        <button onclick="closeDetailsModal()" style="background:#00a884;">Fechar</button>
    </div>
</div>

<script>
let currentUser = null;
let currentFriend = null;
let refreshInterval = null;

// ========== INICIALIZAÇÃO ==========
document.addEventListener("DOMContentLoaded", function () {
    const saved = localStorage.getItem("user");
    if (!saved) {
        window.location.href = "login.html";
        return;
    }

    currentUser = JSON.parse(saved);
    document.getElementById("userName").textContent = currentUser.username;
    document.getElementById("userEmail").textContent = currentUser.email;
    
    const avatarDiv = document.getElementById("userAvatar");
    if (currentUser.avatar) {
        avatarDiv.style.backgroundImage = `url(${currentUser.avatar})`;
        avatarDiv.style.backgroundSize = "cover";
        avatarDiv.style.backgroundPosition = "center";
    }

    loadRequests();
    loadFriends();

    refreshInterval = setInterval(() => {
        if (currentUser) {
            loadRequests();
            loadFriends();
            if (currentFriend) loadMessages();
        }
    }, 3000);
});

// ========== MENU DO USER ==========
function toggleMenu() {
    const menu = document.getElementById("userMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

document.addEventListener("click", function (e) {
    const menu = document.getElementById("userMenu");
    const userInfo = document.querySelector(".user-info");
    const avatar = document.getElementById("userAvatar");
    if (menu && !menu.contains(e.target) && e.target !== userInfo && e.target !== avatar && !userInfo.contains(e.target)) {
        menu.style.display = "none";
    }
});

function showDetails() {
    if (!currentUser) return;
    document.getElementById("detailId").textContent = currentUser.id;
    document.getElementById("detailUsername").textContent = currentUser.username;
    document.getElementById("detailEmail").textContent = currentUser.email;
    document.getElementById("detailsModal").style.display = "flex";
    toggleMenu();
}

function closeDetailsModal() {
    document.getElementById("detailsModal").style.display = "none";
}

function deleteAccount() {
    if (!confirm("Tem certeza que deseja ELIMINAR sua conta permanentemente?")) return;
    if (!currentUser) return;

    fetch(`http://localhost:8080/users/${encodeURIComponent(currentUser.email)}`, {
        method: "DELETE"
    }).then(res => {
        if (res.status === 200) {
            alert("Conta eliminada com sucesso!");
            localStorage.removeItem("user");
            window.location.href = "login.html";
        } else {
            alert("Erro ao eliminar conta");
        }
    }).catch(err => alert("Erro: " + err.message));
}

// ========== AVATAR ==========
function openAvatarModal() {
    document.getElementById("avatarModal").style.display = "flex";
}

function closeAvatarModal() {
    document.getElementById("avatarModal").style.display = "none";
}

function selectAvatar(src) {
    const avatarDiv = document.getElementById("userAvatar");
    avatarDiv.style.backgroundImage = `url(${src})`;
    avatarDiv.style.backgroundSize = "cover";
    avatarDiv.style.backgroundPosition = "center";

    if (currentUser) {
        currentUser.avatar = src;
        localStorage.setItem("user", JSON.stringify(currentUser));

        fetch("http://localhost:8080/users/avatar", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: currentUser.email, avatar: src })
        }).catch(err => console.error("Erro ao salvar avatar:", err));
    }
    closeAvatarModal();
}

// ========== AMIGOS ==========
async function sendFriendRequest() {
    const usernameId = document.getElementById("friendUsername").value.trim();
    if (!usernameId) {
        alert("Digite o username_id (ex: joao_1)");
        return;
    }
    try {
        const res = await fetch("http://localhost:8080/users/friends/request", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sender: currentUser.email, receiver: usernameId })
        });
        const msg = await res.text();
        alert(msg);
        document.getElementById("friendUsername").value = "";
    } catch (err) {
        alert("Erro: " + err.message);
    }
}

async function loadRequests() {
    try {
        const res = await fetch(`http://localhost:8080/users/friends/requests?email=${currentUser.email}`);
        const data = await res.json();
        const container = document.getElementById("requestsList");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state">Nenhum pedido</div>';
            return;
        }
        container.innerHTML = "";
        for (const req of data) {
            const div = document.createElement("div");
            div.className = "request-item";
            div.innerHTML = `
                <div><div class="friend-name">${req.username || req.sender_email}</div></div>
                <button class="accept-btn" onclick="acceptRequest('${req.sender_email}')">Aceitar</button>
            `;
            container.appendChild(div);
        }
    } catch (err) { console.error(err); }
}

async function acceptRequest(senderEmail) {
    try {
        await fetch("http://localhost:8080/users/friends/accept", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sender: senderEmail, receiver: currentUser.email })
        });
        alert("Amigo adicionado!");
        await loadRequests();
        await loadFriends();
    } catch (err) { console.error(err); }
}

async function loadFriends() {
    try {
        const res = await fetch(`http://localhost:8080/users/friends?email=${currentUser.email}`);
        const data = await res.json();
        const container = document.getElementById("friendsList");
        if (!data || data.length === 0) {
            container.innerHTML = '<div class="empty-state">Nenhum amigo</div>';
            return;
        }
        container.innerHTML = "";
        for (const friend of data) {
            const div = document.createElement("div");
            div.className = `friend-item ${currentFriend && currentFriend.email === friend.email ? "active" : ""}`;
            div.innerHTML = `
                <div>
                    <div class="friend-name">${friend.username}</div>
                    <div class="friend-email">${friend.email}</div>
                </div>
            `;
            div.onclick = () => openChat(friend);
            container.appendChild(div);
        }
    } catch (err) { console.error(err); }
}

// ========== CHAT ==========
async function openChat(friend) {
    currentFriend = friend;
    document.getElementById("chatHeader").style.display = "flex";
    document.getElementById("inputArea").style.display = "flex";
    document.getElementById("chatName").textContent = friend.username;
    
    if (friend.avatar) {
        document.getElementById("chatHeaderAvatar").style.backgroundImage = `url(${friend.avatar})`;
        document.getElementById("chatHeaderAvatar").style.backgroundSize = "cover";
        document.getElementById("chatHeaderAvatar").style.backgroundPosition = "center";
    } else {
        document.getElementById("chatHeaderAvatar").style.backgroundImage = "none";
        document.getElementById("chatHeaderAvatar").style.background = "#2a3942";
    }
    
    await loadMessages();
    await markAsRead();
}

async function loadMessages() {
    if (!currentFriend) return;
    try {
        const res = await fetch(`http://localhost:8080/users/messages?userEmail=${currentUser.email}&friendEmail=${currentFriend.email}`);
        const messages = await res.json();
        const container = document.getElementById("messagesContainer");
        container.innerHTML = "";
        if (!messages || messages.length === 0) {
            container.innerHTML = '<div class="empty-state">Nenhuma mensagem ainda. Envie uma!</div>';
            return;
        }
        for (const msg of messages) {
            const isSent = msg.sender_email === currentUser.email;
            const div = document.createElement("div");
            div.className = `message ${isSent ? "sent" : "received"}`;
            div.innerHTML = `<div>${escapeHtml(msg.message)}</div><div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>`;
            container.appendChild(div);
        }
        container.scrollTop = container.scrollHeight;
    } catch (err) { console.error(err); }
}

async function sendMessage() {
    const input = document.getElementById("messageInput");
    const message = input.value.trim();
    if (!message || !currentFriend) return;
    try {
        await fetch("http://localhost:8080/users/messages/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sender: currentUser.email, receiver: currentFriend.email, message })
        });
        input.value = "";
        await loadMessages();
    } catch (err) { console.error(err); }
}

async function markAsRead() {
    if (!currentFriend) return;
    await fetch("http://localhost:8080/users/messages/read", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userEmail: currentUser.email, friendEmail: currentFriend.email })
    });
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}
</script>
</body>
</html>
